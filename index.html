<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-shell">
        <div class="app" id="app">
            <section class="screen login-screen active" id="login-screen">
                <div class="login-art">
                    <div class="brand-mark">
                        <span class="material-symbols-rounded">person</span>
                    </div>
                    <div class="owl" aria-hidden="true">
                        <div class="owl-ear left"></div>
                        <div class="owl-ear right"></div>
                        <div class="owl-face">
                            <span></span>
                            <span></span>
                        </div>
                        <div class="owl-belly"></div>
                    </div>
                    <h1>Doulingo App</h1>
                    <p>Welcome Back</p>
                    <span>Choose your portfolio account and continue your journey.</span>
                </div>

                <form class="login-card" id="login-form">
                    <div class="login-message" id="login-message">
                        <span class="material-symbols-rounded">tips_and_updates</span>
                        <p>Select an account below or sign in with your username and password.</p>
                    </div>

                    <label class="field">
                        <span>Username</span>
                        <input id="username" name="username" type="text" autocomplete="username" placeholder="zerahlen" required>
                    </label>

                    <label class="field">
                        <span>Password</span>
                        <div class="password-row">
                            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
                            <button class="icon-button" id="toggle-password" type="button" aria-label="Show password">
                                <span class="material-symbols-rounded">visibility</span>
                            </button>
                        </div>
                    </label>

                    <div class="form-row">
                        <label class="check-row">
                            <input type="checkbox" id="remember-me">
                            <span>Remember me</span>
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <label class="privacy-row">
                        <input type="checkbox" id="privacy-policy" required>
                        <span>I have read and agree to the Privacy Policy.</span>
                    </label>

                    <button class="primary-button" type="submit">Sign In</button>
                    <p class="error-message" id="login-error" role="alert"></p>

                    <div class="quick-users" aria-label="Demo accounts">
                        <button type="button" data-fill-user="zerahlen">Zerahlen</button>
                        <button type="button" data-fill-user="avril">Avril</button>
                        <button type="button" data-fill-user="klara">klara</button>
                    </div>
                </form>
            </section>

            <section class="screen main-screen" id="main-screen">
                <header class="top-app-bar">
                    <button class="icon-button" id="menu-button" type="button" aria-label="Open menu">
                        <span class="material-symbols-rounded">menu</span>
                    </button>
                    <h2 id="page-title">About Me</h2>
                    <button class="avatar-button" id="avatar-button" type="button" aria-label="Profile">
                        <img id="top-avatar" alt="">
                    </button>
                </header>

                <main class="content" id="content" tabindex="-1"></main>

                <nav class="bottom-nav" aria-label="Primary">
                    <button class="nav-item active" type="button" data-page="about">
                        <span class="material-symbols-rounded">person</span>
                        <small>About Me</small>
                    </button>
                    <button class="nav-item" type="button" data-page="gallery">
                        <span class="material-symbols-rounded">photo_library</span>
                        <small>Gallery</small>
                    </button>
                    <button class="nav-item" type="button" data-page="hobbies">
                        <span class="material-symbols-rounded">interests</span>
                        <small>Hobbies</small>
                    </button>
                    <button class="nav-item" type="button" data-page="music">
                        <span class="material-symbols-rounded">music_note</span>
                        <small>Music</small>
                    </button>
                    <button class="nav-item" type="button" data-page="contact">
                        <span class="material-symbols-rounded">mail</span>
                        <small>Contact</small>
                    </button>
                </nav>
            </section>

            <aside class="drawer" id="drawer" aria-hidden="true">
                <div class="drawer-panel">
                    <button class="icon-button close-drawer" id="close-drawer" type="button" aria-label="Close menu">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                    <img class="drawer-avatar" id="drawer-avatar" alt="">
                    <h3 id="drawer-name"></h3>
                    <p id="drawer-badge"></p>
                    <div class="account-switcher" id="account-switcher" aria-label="View another account"></div>
                    <div class="drawer-menu">
                        <button type="button" data-drawer-page="about"><span class="material-symbols-rounded">person</span>About Me</button>
                        <button type="button" data-drawer-page="gallery"><span class="material-symbols-rounded">photo_library</span>Gallery</button>
                        <button type="button" data-drawer-page="hobbies"><span class="material-symbols-rounded">interests</span>Hobbies</button>
                        <button type="button" data-drawer-page="music"><span class="material-symbols-rounded">music_note</span>Music</button>
                        <button type="button" data-drawer-page="contact"><span class="material-symbols-rounded">mail</span>Contact</button>
                        <hr>
                        <button type="button" id="drawer-logout"><span class="material-symbols-rounded">logout</span>Logout</button>
                    </div>
                </div>
            </aside>

            <div class="dialog-backdrop" id="logout-dialog" aria-hidden="true">
                <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="logout-title">
                    <h2 id="logout-title">Sign Out?</h2>
                    <p>Are you sure you want to sign out?</p>
                    <div class="dialog-actions">
                        <button class="text-button" type="button" id="cancel-logout">Cancel</button>
                        <button class="text-button danger" type="button" id="confirm-logout">Sign Out</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
